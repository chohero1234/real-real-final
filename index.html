<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powerpuff Team 5 HQ</title>
    <!-- React & Babel for Browser Rendering -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Black Han Sans', sans-serif; cursor: crosshair; overflow-x: hidden; }
        .comic-border { border: 4px solid #1f1f1f; box-shadow: 8px 8px 0px #1f1f1f; }
        .comic-border-sm { border: 3px solid #1f1f1f; box-shadow: 4px 4px 0px #1f1f1f; }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; transform: scale(1); filter: blur(60px); }
            50% { opacity: 0.8; transform: scale(1.1); filter: blur(80px); }
        }
        .animate-glow { animation: pulse-glow 3s ease-in-out infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 이미지 로딩 실패 시 처리를 위한 스타일 */
        .member-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 9999px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /**
         * Lucide 아이콘을 React 컴포넌트로 변환하는 헬퍼 함수
         */
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (iconRef.current && lucide.icons[name]) {
                    iconRef.current.innerHTML = '';
                    const iconSvg = lucide.createIcons({
                        icons: { [name]: lucide.icons[name] },
                        attrs: {
                            width: size,
                            height: size,
                            class: className
                        }
                    });
                }
            }, [name, size, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        const App = () => {
            const [view, setView] = useState('home'); 
            const [selectedMission, setSelectedMission] = useState(null);
            const [messages, setMessages] = useState([]);
            const [isTyping, setIsTyping] = useState(false);
            const [language, setLanguage] = useState('ko');
            const [inputText, setInputText] = useState('');
            
            const chatContainerRef = useRef(null);

            const [stars] = useState(() => {
                const starCount = 50;
                const items = [];
                for (let i = 0; i < starCount; i++) {
                    items.push({
                        id: `star-${i}`,
                        top: `${Math.random() * 100}%`,
                        left: `${Math.random() * 100}%`,
                        size: Math.random() * 10 + 6,
                        opacity: Math.random() * 0.7 + 0.3
                    });
                }
                return items;
            });

            useEffect(() => {
                if (chatContainerRef.current) {
                    const { scrollHeight, clientHeight } = chatContainerRef.current;
                    chatContainerRef.current.scrollTo({
                        top: scrollHeight - clientHeight,
                        behavior: 'smooth'
                    });
                }
            }, [messages, isTyping]);

            const translations = {
                ko: {
                    title: "POWERPUFF TEAM 5",
                    subtitle: "AI 공학개론 본부",
                    backToHQ: "본부로 복귀",
                    terminalTitle: "보안 통신 터미널",
                    inputPlaceholder: "메시지를 입력하세요...",
                    unknownResponse: "앗! 그건 내 데이터베이스에 없는걸? 메뉴에서 골라봐!",
                    nameResponse: (name) => `안녕! 나는 [ ${name} ]이야! 무엇을 도와줄까?`
                }
            };

            const t = translations[language];

            const teamData = {
                teamInfo: {
                    id: 'team',
                    name: "TEAM 5",
                    role: "TEAM ASSEMBLY",
                    answer: "우리는 세상을 구하진 않지만, 과제는 반드시 구한다! 💥\n\n바이오메디컬공학부와 자율전공학부의 최강 조합, 5조야! 서로의 전공 지식을 Chemical X처럼 섞어서 완벽한 결과물을 만들어내지. 준비됐어? 가자!",
                    image: "https://i.postimg.cc/QxrpXZM6/Kakao-Talk-20260330-180504799.png", 
                    theme: "main",
                    quickReplies: [
                        { label: "조의 목표", q: "우리 조의 목표는 뭐야?", a: "우리의 목표는 단순한 과제 제출이 아냐! 서로 친해지고 즐겁게 협력해서 최고로 멋진 결과물을 내놓는 거지! 🌟" },
                        { label: "전공 구성", q: "조원들은 어떤 전공이야?", a: "바이오메디컬공학부와 자율전공학부 친구들이 모렸어! 창의적이고 과학적인 에너지가 뿜뿜 솟아나지! 🧪" }
                    ]
                },
                members: [
                    { 
                        id: 1, name: "조영웅", role: "Leader / Blossom", 
                        answer: "안녕! 5조의 리더, 블로섬 조영웅이야! 💖 우리 팀의 임무를 완벽하게 완수하기 위해 준비됐어. 궁금한 게 있다면 무엇이든 물어봐!", 
                        image: "https://i.postimg.cc/fL66rRDp/Kakao-Talk-20260330-175318343.png", 
                        theme: "pink",
                        quickReplies: [
                            { label: "MBTI", q: "너의 MBTI는?", a: "나의 성격 유형은 ISTJ야! 철저하고 계획적인 성격으로 우리 팀의 안정을 책임지지! 📋" },
                            { label: "음식", q: "뭘 좋아해?", a: "고기랑 라면이면 기운이 펄펄 나! 🍖🍜 역시 힘의 원천은 든든한 한 끼지!" },
                            { label: "취미", q: "평소 취미는?", a: "낮잠 자는 거랑 영화 보는 거! 💤 푹 쉬고 나서 영화 한 편 보면 스트레스가 확 풀려!" },
                            { label: "매력포인트", q: "너의 매력은?", a: "어떤 상황에서도 감정 기복이 적은 '평정심'! 🧘‍♂️ 덕분에 냉철하게 팀을 이끌 수 있어!" },
                            { label: "좋아하는 것", q: "좋아하는 게 뭐야?", a: "낮잠이랑 귀여운 고양이를 정말 좋아해! 고양이는 세상을 구한다구! 🐈" }
                        ]
                    },
                    { 
                        id: 2, name: "박선주", role: "Joy / Bubbles", 
                        answer: "와아! 반가워! 나는 5조의 긍정 에너지, 버블스 박선주야! 💙 오늘도 즐겁게 과제를 해결해보자! 나에 대해 알고 싶은 게 있니?", 
                        image: "https://i.postimg.cc/jdnDfwnQ/Kakao-Talk-20260330-173151709.png", 
                        theme: "blue",
                        quickReplies: [
                            { label: "MBTI", q: "너의 MBTI는?", a: "나는 ISFJ야! 조용하지만 따뜻한 마음으로 친구들을 챙겨주는 걸 좋아해! 🌼" },
                            { label: "음식", q: "좋아하는 간식은?", a: "말랑말랑 달콤한 젤리가 최고야! 🍬 한 입 먹으면 기분이 날아갈 것 같아!" },
                            { label: "취미", q: "취미가 뭐야?", a: "OTT 보면서 뒹굴뒹굴하는 걸 좋아해! 📺 침대 위가 내 본부라구!" },
                            { label: "매력포인트", q: "너의 매력은?", a: "언제나 세상을 환하게 밝히는 나의 '밝음'! ☀️ 내 웃음소리를 들으면 모두가 행복해질걸?" },
                            { label: "좋아하는 것", q: "뭐할 때 행복해?", a: "잠자기랑 집에서 쉬기! 🏠 푹 쉬어야 긍정 에너지가 충전되거든!" }
                        ]
                    },
                    { 
                        id: 4, name: "신가연", role: "Power / Buttercup", 
                        answer: "야호! 5조의 실행력을 담당하는 버터컵 신가연이야! 💚 어떤 어려운 문제도 거침없이 돌파해버릴 준비가 되어 있어! 질문 대환영이야!", 
                        image: "https://i.postimg.cc/Kvfn9g8F/Kakao-Talk-20260330-172054822.png", 
                        theme: "green",
                        quickReplies: [
                            { label: "MBTI", q: "너의 MBTI는?", a: "나는 INTP야! 호기심 많고 아이디어가 넘치는 전략가 타입이지! 🧠" },
                            { label: "음식", q: "소울푸드는?", a: "당연히 떡볶이! 🌶️ 특히 '엽떡 순한맛에 치즈 추가'는 내 생존 필수품이야!" },
                            { label: "취미/특기", q: "특기가 뭐야?", a: "내 특기는 '겨울잠 자기'야! ❄️💤 어떤 고난이 있어도 숙면할 수 있지! 그리고 뮤지컬 보고 감탄하는 것도 좋아해!" },
                            { label: "매력포인트", q: "너의 매력은?", a: "나의 '은근한 엉뚱함'! 🤪 예상치 못한 곳에서 터지는 내 매력에 빠져볼래?" },
                            { label: "특이사항", q: "또 다른 특징은?", a: "뮤지컬 티켓팅하기가 취미야! 황금 손가락이라고 불러줘! 🎟️" }
                        ]
                    },
                    { 
                        id: 3, name: "박효빈", role: "Secret / Chemical X", 
                        answer: "안녕 안녕! 나는 5조의 케미컬 X, 박효빈이야! 💜 우리 팀원들이 최고의 조화를 이룰 수 있도록 돕는 게 내 임무지! 나랑 대화해볼래?", 
                        image: "https://i.postimg.cc/tJvVjwvd/Kakao-Talk-20260330-175622603.png", 
                        theme: "purple",
                        quickReplies: [
                            { label: "MBTI", q: "너의 MBTI는?", a: "나는 ISFP야! 예술적인 감각과 따뜻한 감수성을 가지고 있지! 🎨" },
                            { label: "음식", q: "음식 추천해줘!", a: "매콤달콤한 떡볶이가 최고지! 🥘 한 입 먹으면 피로가 싹 가신다니까?" },
                            { label: "취미", q: "쉴 때 뭐해?", a: "재밌는 드라마 보는 걸 정말 좋아해! 🎬 드라마 속 세상은 너무 흥미로워!" },
                            { label: "매력포인트", q: "너의 매력은?", a: "나의 필살기는 '다른 사람 말 잘 들어주기'! 👂 진심을 다해 경청하는 게 내 최고의 무기야!" },
                            { label: "좋아하는 것", q: "열정을 쏟는 곳은?", a: "콘서트 보러 가기! 🎤 현장의 열기를 느끼면 가슴이 두근거려!" }
                        ]
                    }
                ]
            };

            const handleMissionStart = (mission) => {
                setSelectedMission(mission);
                setView('mission');
                setMessages([]);
                setIsTyping(true);
                window.scrollTo(0, 0);

                setTimeout(() => {
                    setIsTyping(false);
                    setMessages([{
                        id: Date.now(),
                        type: 'bot',
                        text: mission.answer,
                        name: mission.name,
                        theme: mission.theme
                    }]);
                }, 800);
            };

            const handleSendMessage = (e) => {
                e.preventDefault();
                if (!inputText.trim() || isTyping) return;

                const userText = inputText.trim();
                setInputText('');

                setMessages(prev => [...prev, { id: Date.now(), type: 'user', text: userText }]);
                setIsTyping(true);

                setTimeout(() => {
                    setIsTyping(false);
                    const cleanInput = userText.replace(/\s+/g, '').toLowerCase();
                    let responseText = '';

                    if (cleanInput.includes('이름') || cleanInput.includes('누구')) {
                        responseText = t.nameResponse(selectedMission.name);
                    } else if (cleanInput.includes('mbti')) {
                        const mbtiReply = selectedMission.quickReplies.find(r => r.label === 'MBTI');
                        responseText = mbtiReply ? mbtiReply.a : t.unknownResponse;
                    } else {
                        const match = selectedMission.quickReplies.find(reply => {
                            const cleanQ = reply.q.replace(/\s+/g, '').toLowerCase();
                            const cleanLabel = reply.label.replace(/\s+/g, '').toLowerCase();
                            return cleanInput.includes(cleanQ) || cleanInput.includes(cleanLabel) || cleanQ.includes(cleanInput);
                        });
                        responseText = match ? match.a : t.unknownResponse;
                    }

                    setMessages(prev => [...prev, {
                        id: Date.now() + 1,
                        type: 'bot',
                        text: responseText,
                        name: selectedMission.name,
                        theme: selectedMission.theme
                    }]);
                }, 1000);
            };

            const handleQuickReply = (q, a) => {
                if (isTyping) return;
                setMessages(prev => [...prev, { id: Date.now(), type: 'user', text: q }]);
                setIsTyping(true);
                setTimeout(() => {
                    setIsTyping(false);
                    setMessages(prev => [...prev, {
                        id: Date.now() + 1,
                        type: 'bot',
                        text: a,
                        name: selectedMission.name,
                        theme: selectedMission.theme
                    }]);
                }, 1000);
            };

            const currentTheme = (themeName) => {
                const colors = {
                    main: { bg: 'bg-[#4b8df8]', accent: 'bg-[#ff006e]' },
                    pink: { bg: 'bg-[#ff85a2]', accent: 'bg-[#ff006e]' },
                    blue: { bg: 'bg-[#a2d2ff]', accent: 'bg-[#0077b6]' },
                    green: { bg: 'bg-[#b7efc5]', accent: 'bg-[#2d6a4f]' },
                    purple: { bg: 'bg-[#e0aaff]', accent: 'bg-[#5a189a]' }
                };
                return colors[themeName] || colors.main;
            };

            const theme = currentTheme(selectedMission?.theme || 'main');

            return (
                <div className={`min-h-screen ${view === 'home' ? 'bg-[#4b8df8]' : theme.bg} transition-colors duration-500 relative`}>
                    <div className="fixed inset-0 pointer-events-none z-0">
                        {stars.map((star) => (
                            <div key={star.id} className="absolute" style={{ top: star.top, left: star.left, opacity: star.opacity }}>
                                <div className="text-yellow-200 fill-yellow-200">★</div>
                            </div>
                        ))}
                    </div>

                    {view === 'home' && (
                        <div className="relative z-10 p-6 animate-in fade-in duration-500">
                            <header className="pt-20 text-center">
                                <div className="inline-block bg-white comic-border px-12 py-8 -rotate-2">
                                    <h1 className="text-4xl md:text-8xl text-[#1f1f1f]">{t.title}</h1>
                                </div>
                                <div className="mt-8">
                                    <span className="bg-[#ff006e] text-white px-8 py-3 comic-border-sm text-xl md:text-2xl">{t.subtitle}</span>
                                </div>
                            </header>

                            <main className="max-w-6xl mx-auto py-20 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                                <button onClick={() => handleMissionStart(teamData.teamInfo)} className="lg:col-span-2 bg-white comic-border p-10 text-left group hover:scale-[1.01] transition-transform flex flex-col justify-between h-72">
                                    <div className="flex items-center gap-4 mb-6">
                                        <div className="text-[#ff006e]"><Icon name="FlaskConical" size={40} /></div>
                                        <h2 className="text-4xl">TEAM REPORT</h2>
                                    </div>
                                    <div className="bg-[#1f1f1f] text-white self-end px-8 py-3 comic-border-sm group-hover:bg-[#ff006e] transition-colors flex items-center gap-3">
                                        OPEN TERMINAL <Icon name="Zap" size={20} />
                                    </div>
                                </button>

                                {teamData.members.map(m => (
                                    <button key={m.id} onClick={() => handleMissionStart(m)} className={`comic-border p-8 flex flex-col items-center gap-4 hover:-translate-y-2 transition-transform ${m.theme === 'pink' ? 'bg-[#ff85a2]' : m.theme === 'blue' ? 'bg-[#a2d2ff]' : m.theme === 'green' ? 'bg-[#b7efc5]' : 'bg-[#e0aaff]'}`}>
                                        <div className="w-20 h-20 rounded-full bg-white comic-border-sm overflow-hidden flex items-center justify-center shadow-lg">
                                            {/* 아이콘 대신 이미지로 교체 */}
                                            <img src={m.image} alt={m.name} className="member-avatar" />
                                        </div>
                                        <h3 className="text-2xl">{m.name}</h3>
                                        <p className="text-xs opacity-60 uppercase">{m.role}</p>
                                    </button>
                                ))}
                            </main>
                        </div>
                    )}

                    {view === 'mission' && selectedMission && (
                        <div className="min-h-screen flex flex-col relative z-10 animate-in slide-in-from-right duration-500">
                            <nav className="p-8 flex justify-between items-center">
                                <button onClick={() => setView('home')} className="flex items-center gap-3 bg-white comic-border-sm px-6 py-3 hover:bg-gray-100 uppercase">
                                    <Icon name="ArrowLeft" size={20} /> {t.backToHQ}
                                </button>
                                <div className="bg-[#1f1f1f] text-white px-6 py-3 comic-border-sm text-sm">
                                    AGENT: {selectedMission.name}
                                </div>
                            </nav>

                            <main className="flex-1 max-w-7xl mx-auto w-full px-6 py-4 grid grid-cols-1 lg:grid-cols-12 gap-10 items-start">
                                <div className="h-[70vh] flex flex-col lg:col-span-7">
                                    <div className="flex-1 bg-white comic-border flex flex-col overflow-hidden relative">
                                        <div className="bg-[#1f1f1f] p-4 flex justify-between items-center">
                                            <div className="flex gap-2">
                                                <div className="w-3 h-3 rounded-full bg-red-500"></div>
                                                <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                                                <div className="w-3 h-3 rounded-full bg-green-500"></div>
                                            </div>
                                            <span className="text-white text-[10px] tracking-widest opacity-50 uppercase">{t.terminalTitle}</span>
                                        </div>

                                        <div ref={chatContainerRef} className="flex-1 overflow-y-auto p-6 space-y-6 bg-gray-50/50 no-scrollbar">
                                            {messages.map((msg, idx) => (
                                                <div key={idx} className={`flex flex-col ${msg.type === 'user' ? 'items-end' : 'items-start'} animate-in slide-in-from-bottom-2`}>
                                                    <div className={`comic-border-sm p-5 max-w-[85%] ${msg.type === 'user' ? 'bg-[#ff006e] text-white' : 'bg-white text-[#1f1f1f]'}`}>
                                                        <p className="text-xl leading-relaxed whitespace-pre-wrap">{msg.text}</p>
                                                    </div>
                                                </div>
                                            ))}
                                            {isTyping && <div className="w-16 h-8 bg-gray-200 animate-pulse comic-border-sm"></div>}
                                        </div>

                                        <div className="bg-white px-4 py-3 border-t-2 border-gray-100 overflow-x-auto no-scrollbar flex gap-3">
                                            {selectedMission.quickReplies.map((reply, i) => (
                                                <button key={i} onClick={() => handleQuickReply(reply.q, reply.a)} className="whitespace-nowrap bg-white hover:bg-[#ff006e] hover:text-white border-2 border-[#1f1f1f] px-5 py-2 rounded-full text-sm transition-colors shadow-[2px_2px_0px_#1f1f1f]">
                                                    {reply.label}
                                                </button>
                                            ))}
                                        </div>

                                        <form onSubmit={handleSendMessage} className="p-4 bg-white border-t-4 border-[#1f1f1f] flex gap-3">
                                            <input type="text" value={inputText} onChange={(e) => setInputText(e.target.value)} placeholder={t.inputPlaceholder} className="flex-1 bg-gray-50 comic-border-sm px-5 py-3 text-lg focus:outline-none" />
                                            <button type="submit" className="bg-[#1f1f1f] text-white p-3 comic-border-sm hover:bg-[#ff006e] transition-colors">
                                                <Icon name="Send" size={24} />
                                            </button>
                                        </form>
                                    </div>
                                </div>

                                <div className="lg:col-span-5 flex flex-col items-center justify-center space-y-6 pb-10">
                                    <div className="relative w-full max-w-sm">
                                        <div className={`absolute -inset-6 animate-glow pointer-events-none rounded-full blur-3xl opacity-30 ${selectedMission.theme === 'pink' ? 'bg-pink-500' : selectedMission.theme === 'blue' ? 'bg-blue-500' : selectedMission.theme === 'green' ? 'bg-green-500' : 'bg-purple-500'}`}></div>
                                        <div className="relative z-10 comic-border bg-white overflow-hidden shadow-2xl">
                                            <img src={selectedMission.image} alt={selectedMission.name} className="w-full h-auto object-cover" />
                                        </div>
                                    </div>
                                    <div className="bg-[#1f1f1f] text-white comic-border-sm px-8 py-3 uppercase tracking-widest text-xs">
                                        {selectedMission.role} // BIO ACCESS
                                    </div>
                                </div>
                            </main>
                        </div>
                    )}

                    <footer className="py-10 text-center opacity-20 uppercase tracking-[0.4em] text-[10px]">
                        ★ Powered by Team 5 Laboratory ★
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
